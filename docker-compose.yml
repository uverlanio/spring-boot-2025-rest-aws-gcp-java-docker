name: spring-boot-2025-rest-aws-gcp-java-docker

services:
  db:
    image: mysql:9.1.0
    restart: always
    environment:
      TZ: America/Sao_Paulo
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_USER: docker
      MYSQL_PASSWORD: admin
      MYSQL_DATABASE: DB_UDEMY
    ports:
      - "3308:3306"
    expose:
      - 3306
    networks:
      - sb-network
  spring-boot-2025-rest-aws-gcp-java-docker:
    image: uverdocker/spring-boot-2025-rest-aws-gcp-java-docker
    restart: always
    build: ./spring-boot-2025-rest-aws-gcp-java-docker
    working_dir: /spring-boot-2025-rest-aws-gcp-java-docker
    environment:
      TZ: America/Sao_Paulo
      SPRING.DATASOURCE.URL: jdbc:mysql://db:3306/DB_UDEMY?createDatabaseIfNotExist=true&useTimezone=true&serverTimezone=UTC
      SPRING.DATASOURCE.USERNAME: root
      SPRING.DATASOURCE.PASSWORD: admin
    command: mvn spring-boot:run
    ports:
      - 80:80
    depends_on:
      - db
    networks:
      - sb-network
networks:
  sb-network:
    driver: bridge
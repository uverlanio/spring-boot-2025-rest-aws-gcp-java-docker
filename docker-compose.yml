services:
  db:
    image: mysql:9.1.0
    restart: always
    environment:
      TZ: America/Sao_Paulo
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_USER: docker
      MYSQL_PASSWORD: admin
      MYSQL_DATABASE: DB_UDEMY
    ports:
      - "3308:3306"
    expose:
      - 3306
    networks:
      - sb-network
  spring-boot-2025-rest-aws-gcp-java-docker:
    image: uverdocker/spring-boot-2025-rest-aws-gcp-java-docker
    restart: always
    working_dir: /spring-boot-2025-rest-aws-gcp-java-docker
    environment:
      TZ: America/Sao_Paulo
      SPRING.DATASOURCE.URL: jdbc:mysql://udemy-db-server.cluia8m4g06o.us-east-2.rds.amazonaws.com/db_udemy?createDatabaseIfNotExist=true&useTimezone=true&serverTimezone=UTC
      SPRING.DATASOURCE.USERNAME: root
      SPRING.DATASOURCE.PASSWORD: admin123
    command: mvn spring-boot:run
    ports:
      - 80:80
    depends_on:
      - db
    networks:
      - sb-network
  portainer:
    image: portainer/portainer-ce:latest
    restart: always
    ports:
      - 9000:9000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - sb-network

volumes:
  portainer_data:

networks:
  sb-network:
    driver: bridge
name: Continuous Integration and Delivery with Github Actions

on:
  push:
    branches:
      - "secao_28"

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
          check-latest: false
          cache-dependency-path: '**/pom.xml'

      - name: Build Application .jar
        working-directory: ./
        run: mvn clean package -DskipTests

      - name: Docker Compose Build
        working-directory: ../
        run: docker compose build

      - name: Push to Docker Hub Container Registry
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/spring-boot-2025-rest-aws-gcp-java-docker:latest ${{ secrets.DOCKER_USERNAME }}/spring-boot-2025-rest-aws-gcp-java-docker:${{ github.run_id }}
          docker push ${{ secrets.DOCKER_USERNAME }}/spring-boot-2025-rest-aws-gcp-java-docker:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/spring-boot-2025-rest-aws-gcp-java-docker:${{ github.run_id }}
          
          

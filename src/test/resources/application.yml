server:
  port: 8888

spring:
  application:
    name: spring-boot-2025-rest-aws-gcp-java-docker

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/DB_UDEMY?useTimezone=true&serverTimezone=UTC

  flyway:
    user: root
    password: admin
    url: jdbc:mysql://localhost:3306/DB_UDEMY?useTimezone=true&serverTimezone=UTC&allowPublicKeyRetrieval=true
    enabled: true

  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.MySQL8Dialect
    show-sql: false
    properties:
      hibernate:
        open-in-view: false
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enabled: true
      mail.smtp.starttls.required: true
  servlet:
    multipart:
      enabled: true
      file-size-threshold: 2KB
      max-file-size: 200MB
      max-request-size: 215MB

cors:
  originPatterns: http://localhost:8080,http://prontuarios-jaala.com
file:
  upload-dir: /Code/UploadDir
security:
  jwt:
    token:
      secret-key: 53cr37
      expire-lenght: 3600000
email:
  subject: "Default Subject"
  message: "Default Message"

springdoc:
  paths-to-match:
    - /api/**/v1/
    - /auth/**
  swagger-ui:
    use-root-path: true

logging:
  level:
    root: INFO
    br.com.sbrwgjd: DEBUG


server:
  port: 8888

spring:
  application:
    name: spring-boot-2025-rest-aws-gcp-java-docker

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/DB_UDEMY?useTimezone=true&serverTimezone=UTC

  flyway:
    user: root
    password: admin
    url: jdbc:mysql://localhost:3306/DB_UDEMY?useTimezone=true&serverTimezone=UTC&allowPublicKeyRetrieval=true
    enabled: true

  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.MySQL8Dialect
    show-sql: false
    properties:
      hibernate:
        open-in-view: false

cors:
  originPatterns: http://localhost:8080,http://prontuarios-jaala.com

springdoc:
  paths-to-match: /api/**/v1/**
  swagger-ui:
    use-root-path: true

logging:
  level:
    root: INFO
    br.com.sbrwgjd: DEBUG

